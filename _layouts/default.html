<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} — {% endif %}Ivan Ivančič</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg: #080808;
            --bg-elevated: #0f0f0f;
            --bg-card: #111111;
            --fg: #d0d0d0;
            --fg-dim: #666666;
            --fg-bright: #e8e8e8;
            --accent: #00ff41;
            --accent-dim: #00cc33;
            --accent-glow: rgba(0, 255, 65, 0.15);
            --border: #1a1a1a;
            --border-hover: #2a2a2a;
            --critical: #ff3333;
            --high: #ff8844;
            --medium: #44aaff;
            --code-bg: #0a0a0a;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 15px;
            line-height: 1.75;
            color: var(--fg);
            background: var(--bg);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Subtle scanline overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Layout */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Header */
        .site-header {
            padding: 4rem 0 2.5rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .site-header h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--fg-bright);
            letter-spacing: -0.02em;
            margin-bottom: 0.4rem;
        }

        .site-header h1::before {
            content: "$ ";
            color: var(--accent);
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--fg-dim);
            margin-bottom: 1.5rem;
        }

        .nav {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav a {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--fg-dim);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.2s;
            padding-bottom: 2px;
        }

        .nav a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Content */
        main {
            padding-bottom: 4rem;
        }

        h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--fg-bright);
            margin: 3rem 0 1.2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }

        h2 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--fg-bright);
            margin: 3rem 0 1.2rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border);
        }
        
        h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--fg-bright);
            margin: 2.2rem 0 1rem;
        }

        p {
            margin-bottom: 1.2rem;
            color: var(--fg);
        }

        a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: all 0.15s;
        }

        a:hover {
            border-bottom-color: var(--accent);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        /* Lists */
        ul, ol {
            margin: 0 0 1.5rem 1.2rem;
        }

        li {
            margin-bottom: 0.5rem;
            color: var(--fg);
        }

        li::marker {
            color: var(--accent-dim);
        }

        /* Code */
        code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
            background: var(--code-bg);
            color: var(--accent);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border);
        }

        pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1.2rem;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.6;
            margin: 0 0 1.5rem;
            color: var(--fg-bright);
        }

        pre code {
            background: none;
            border: none;
            padding: 0;
            color: inherit;
            font-size: inherit;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin: 1.5rem 0;
            font-family: 'JetBrains Mono', monospace;
        }

        th, td {
            text-align: left;
            padding: 0.7rem 0.8rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--fg-dim);
            border-top: 1px solid var(--border);
        }

        tr:hover td {
            background: rgba(0, 255, 65, 0.03);
        }

        .severity-c { color: var(--critical); font-weight: 600; }
        .severity-h { color: var(--high); font-weight: 600; }
        .severity-m { color: var(--medium); font-weight: 600; }

        .status-paid { color: var(--accent); font-weight: 500; }
        .status-pending { color: var(--fg-dim); }
        .status-cve { color: var(--accent); font-weight: 600; }

        /* Blockquote */
        blockquote {
            border-left: 2px solid var(--accent);
            margin: 1.5rem 0;
            padding: 0.5rem 0 0.5rem 1.2rem;
            color: var(--fg-dim);
            font-style: italic;
            background: var(--bg-elevated);
            border-radius: 0 4px 4px 0;
        }

        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.5rem 0;
        }

        /* Footer */
        .site-footer {
            padding: 2rem 0 3rem;
            border-top: 1px solid var(--border);
            text-align: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--fg-dim);
        }

        .site-footer a {
            color: var(--fg-dim);
            border-bottom: 1px solid var(--border);
        }

        .site-footer a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* Selection */
        ::selection {
            background: var(--accent-glow);
            color: var(--fg-bright);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--fg-dim);
        }

        /* Mobile */
        @media (max-width: 600px) {
            .site-header { padding: 2.5rem 0 1.5rem; }
            .site-header h1 { font-size: 1.3rem; }
            .nav { gap: 1rem; }
            table { font-size: 0.8rem; }
            th, td { padding: 0.5rem 0.4rem; }
            pre { padding: 0.8rem; font-size: 0.75rem; }
        }

        /* Blink cursor effect for header */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="site-header">
            <h1><a href="/" style="color: inherit; text-decoration: none; border-bottom: none;">Ivan Ivančič</a></h1>
            <p class="tagline">Security Research - Web Application Security</p>
            <nav class="nav">
                <a href="mailto:ivanivancic721@gmail.com">Email</a>
                <a href="https://www.linkedin.com/in/ivan-ivan%C4%8Di%C4%87-a3438a1aa">LinkedIn</a>
            </nav>
        </header>

        <main>
            {{ content }}
        </main>

        <footer class="site-footer">
            CPTS - https://github.com/rust-ammonia/ammonia/security/advisories/GHSA-9jh8-v38h-cvhr · <a href="mailto:ivanivancic721@gmail.com">ivanivancic721@gmail.com</a>
        </footer>
    </div>

</body>
</html>
